<!--
  Dante Shokz PPT · cover.html
  ────────────────────────────────────────────────────────
  组件：封面页（P01 完整内容）
  适用：所有 deck 的第一页
  来源：原 deck P01

  可改字段：
    1. 顶部左 "SHOKZ · PMKT ·"   —— 部门 / 业务线信息
    2. 顶部右 "Dante Zeng"        —— Presenter 英文名
    3. 橙色竖条旁的小标题（22pt）  —— 场景名（如"试用期答辩"/"产品上市策划"/"季度汇报"）
    4. 主标题（60pt 黑+橙混色）    —— 8 字内最佳；橙色强调最多 2 个关键词

    6. 16pt 角色描述               —— "Shokz 韶音 · 北美业务部 · 产品营销"
    7. 右侧 22pt 日期               —— "YYYY / MM"
    8. 页脚 "01 / 16" 改总页数

  不可改：
    - 所有 left / top / width / height 数值
    - 橙色竖条位置和颜色（#FF7A3D, 8×74.66）
    - 主标题字号 60pt
    - PRESENTER / DATE 等英文标签（10pt 等宽）
    - 中部 1088×528 浅边框容器（视觉框架锁）
    - 底部细分隔线 106.66×1.33（#BABABA）

  注意：
    - 主标题里"学习业务 改造业务"那种"动作 + 强调动作"的二段式建议保留
    - 不要加 logo（封面够干净）；如必须放 logo 放在右下角不要喧宾夺主
-->
