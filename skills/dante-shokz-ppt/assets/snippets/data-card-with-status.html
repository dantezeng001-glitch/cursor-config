<!--
  Dante Shokz PPT · data-card-with-status.html
  ────────────────────────────────────────────────────────
  组件：数据卡（带 ID + 状态徽章）
  适用：任务看板 / 项目列表 / 知识库索引 / 产品 SKU 列表
  来源：原 deck P05 9-cards 内的单卡（独立抽出复用）

  设计：
    - 默认 262 × 140 单卡，但宽度可调（180-400）
    - 顶行：左 8.5pt 等宽 ID（如 "01"）+ 右 8.5pt 等宽状态徽章
    - 中部：12pt 加粗中文标题 + 9pt 灰色副说明
    - 底部分隔线 + 9.5pt 任务/产品描述

  可改字段：
    1. 卡片宽度（180-400 范围内）
    2. ID 文本（"01"、"A1"、"SKU-001" 等）
    3. 状态徽章：
       - DONE  → background:#FF7A3D（橙）
       - WIP   → background:#666666（灰）
       - LIVE  → background:#050505（黑）
       - DRAFT → background:#BABABA（浅灰）
       - 自定义 → 其他 brand-spec 内的色
    4. 边色：默认 #BABABA / 突出 #FF7A3D / 极简 #E5E5E5
    5. 标题 / 副说明 / 任务描述

  不可改：
    - 状态徽章字号 8.5pt 等宽
    - ID 字号 8.5pt 等宽
    - 标题字号 12pt 加粗
    - 内 padding 12 14
    - 底部分隔线 1px solid #F1F1F1
-->

<!-- 数据卡示例 -->
<div class="shp" style="left:96.0px;top:200.0px;width:262px;height:140px;background:#FFFFFF;border:1px solid #BABABA;padding:12px 14px;box-sizing:border-box;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between">
  <div>
    <!-- 顶行：ID + 状态徽章 -->
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:8.5pt;color:#999999;font-family:'Consolas','Courier New',monospace">01</span>
      <span style="font-size:8.5pt;color:#FFFFFF;background:#FF7A3D;padding:2px 6px;font-family:'Consolas','Courier New',monospace">DONE</span>
    </div>
    <!-- 标题 -->
    <p class="pp" style="text-align:left;margin-top:8px"><span style="font-size:12.0pt;color:#050505;font-weight:700;line-height:1.3">卡片中文标题</span></p>
    <!-- 副说明 -->
    <p class="pp" style="text-align:left;margin-top:4px"><span style="font-size:9.0pt;color:#666666">副说明 / 任务属性</span></p>
  </div>
  <!-- 底部分隔线 + 描述 -->
  <div style="border-top:1px solid #F1F1F1;padding-top:6px">
    <p class="pp" style="text-align:left"><span style="font-size:9.5pt;color:#2F2F2F;line-height:1.35">一行任务描述 / 主要内容</span></p>
  </div>
</div>
