<!--
  Dante Shokz PPT · ripple-3-layer.html
  ────────────────────────────────────────────────────────
  组件：三层涟漪扩散叙事
  适用：讲一件事的"个人 → 团队 → 组织"或"部门内 → 跨部门 → 公司级"扩散
  来源：原 deck P09

  布局：
    [════════ R 头部条（全宽 80px Ink 底）════════════]
    [LAYER 01 灰边]  [LAYER 02 中灰边]  [LAYER 03 橙边]
    [中文标题]       [中文标题]         [中文标题]
    [12pt 正文]      [12pt 正文]        [12pt 正文]

  可改字段：
    1. R 头部条的"结果总述"（18pt 加粗白字）和右侧副说明（13pt 浅灰）
    2. 三层 LAYER 名（中英：如"LAYER 01 · 部门内"）
    3. 三层中文标题（16pt 加粗）
    4. 三层 12pt 正文（关键词用 #FF7A3D 加粗强调）

  不可改：
    - 三栏宽 353.78
    - 顶部 3pt 粗 border 配色顺序：#BABABA → #666666 → #FF7A3D（从近到远 / 从小到大）
    - 上方 R 头部条 1088×80 Ink 黑底
    - LAYER 字号 10pt 等宽 / 标题 16pt 加粗 / 正文 12pt

  红线：
    - ❌ 不要反过来用色（橙→中灰→灰会让"扩散感"逻辑错乱）
    - ❌ 不要只用 2 层（那是对比，不是涟漪）
-->
