<!--
  Dante Shokz PPT · star-card.html
  ────────────────────────────────────────────────────────
  组件：STAR 卡（黑头 50px + 灰 body）
  适用：案例分析、项目复盘
  来源：原 deck P06 / P08（两种排法）

  本文件提供两种排法：
    A. 三栏并列 S / T / A，下方 R 单独成行（参考 P06）
    B. 二栏 320 + 748：左侧 S/T 上下堆，右侧 A 大块（参考 P08）

  可改字段：
    1. S/T/A/R 各卡的标题行（14-16pt 黑色加粗）
    2. 每卡的 ① ② ③ 列表项内容
    3. 头部右侧"中文 + 英文"（如 "ACTION · 行动" / "ACTION · 行动 · 4 步"）

  不可改：
    - S/T/A/R 字母（这是 framework 字母）
    - 头部底色 #050505 / body 底色 #F1F1F1
    - 头部 50px / body 高度（按页面布局算）
    - ① ② ③ 编号橙色 + Consolas 字体

  使用方式：
    - 先粘页眉 / 主标题 / 徽章
    - 然后粘下方的 A 或 B 排法 STAR 卡
    - 最后粘页脚
-->
