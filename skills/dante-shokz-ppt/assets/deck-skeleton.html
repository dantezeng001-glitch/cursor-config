<!-- 翻页脚本：键盘 ↑↓ / PageUp/PageDown / Home / End / Space -->
<script>
  const slides = Array.from(document.querySelectorAll('.deck-slide'));
  let cur = 0;
  function go(d) {
    cur = Math.max(0, Math.min(slides.length - 1, cur + d));
    slides[cur].scrollIntoView({behavior: 'smooth', block: 'center'});
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault(); go(1);
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'PageUp') {
      e.preventDefault(); go(-1);
    } else if (e.key === 'Home') {
      cur = 0; slides[0].scrollIntoView();
    } else if (e.key === 'End') {
      cur = slides.length - 1; slides[cur].scrollIntoView();
    }
  });
  /* 滚动时同步 cur */
  const io = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting && e.intersectionRatio > 0.5) {
        cur = slides.indexOf(e.target);
      }
    }
  }, { threshold: [0.5] });
  slides.forEach(s => io.observe(s));
</script>

</body>
